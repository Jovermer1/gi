<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рюкзаки У Таляшки</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imgs/backpack_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.svg" type="image/x-icon">
</head>
<body>
    <nav class="navbar">
        <div class="logo">PACK<span>PERFECT</span></div>
        <ul class="nav-links">
            <li><a href="guide.html" class="active">Что-то интересное</a></li>
            <li><a href="index.html" class="active">Главная</a></li>
            <li><a href="calculator.html">Калькулятор</a></li>
            <li><button id="theme-btn" class="theme-toggle">Светлая тема</button></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Твой идеальный спутник</h1>
            <p>Рюкзак — это не просто сумка. Это свобода передвижения. Узнай, как найти тот самый.</p>
            <div class="cta-group">
                <a href="guide.html" class="btn primary">Бренды</a>
                <a href="calculator.html" class="btn secondary">Подобрать объем</a>
            </div>
        </div>
    </header>

    <script src="script.js">const themeBtn = document.getElementById('theme-btn');
        const currentTheme = localStorage.getItem('theme');
        
        // Проверяем, была ли сохранена тема ранее
        if (currentTheme === 'light') {
            document.body.classList.add('light-theme');
            themeBtn.textContent = 'Тёмная тема';
        }
        
        themeBtn.addEventListener('click', function() {
            // Переключаем класс у body
            document.body.classList.toggle('light-theme');
            
            let theme = 'dark';
            if (document.body.classList.contains('light-theme')) {
                theme = 'light';
                themeBtn.textContent = 'Тёмная тема';
            } else {
                themeBtn.textContent = 'Светлая тема';
            }
            
            // Сохраняем выбор пользователя
            localStorage.setItem('theme', theme);
        });
        </script>
</body>
</html>
